[package]
name = "medme-share"
version = "0.1.0"
edition = "2021"
description = "平台无关的分享与导出:把 Vault 病历打包成自包含 HTML(明文时间线导出)或端到端加密分享。桌面与未来移动端共用。"

[lib]
name = "medme_share"

[dependencies]
core-model = { path = "../core-model" }
pipeline = { path = "../pipeline" }
parser = { path = "../parser" }
# `render_png` compiles without the C/C++ `codecs` feature (it just supports
# fewer transfer syntaxes at runtime, and share already degrades unsupported
# ones to a text line). Desktop re-enables codecs via its direct `dicom` dep;
# the mobile Android build keeps them off so the C++ decoders aren't compiled.
dicom = { path = "../dicom", default-features = false }
serde_json = { workspace = true }
sha2.workspace = true
chrono.workspace = true
base64 = "0.22"
aes-gcm = "0.11"
# OS 熵源:rand 0.10 移除了 OsRng,而 OsRng 本就是 getrandom 的薄封装。
getrandom = "0.4"

[dev-dependencies]
pipeline = { path = "../pipeline" }
tempfile = { workspace = true }
# 仅供 vendored dicom-parser 的完整性测试(校验内联 JS 未被篡改)。
sha2 = { workspace = true }
