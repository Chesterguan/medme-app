<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Segoe UI", sans-serif; color: #1e293b; margin: 0; padding: 0; background: #f8fafc; }
  .wrap { max-width: 900px; margin-inline: auto; padding: 24px; }
  /* 口令输入屏 */
  .gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .gate-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 32px; max-width: 420px; width: 100%; box-shadow: 0 8px 30px rgba(15,23,42,.06); }
  .gate-card h1 { font-size: 20px; color: #1560a8; margin: 0 0 6px; }
  .gate-card p { font-size: 13px; color: #64748b; line-height: 1.6; margin: 0 0 18px; }
  .gate-card label { display: block; font-size: 12px; font-weight: 600; color: #334155; margin-bottom: 6px; }
  .gate-card input { width: 100%; font-size: 15px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; padding: 11px 12px; border: 1px solid #cbd5e1; border-radius: 10px; letter-spacing: .5px; }
  .gate-card input:focus { outline: none; border-color: #1789c1; box-shadow: 0 0 0 3px rgba(23,137,193,.15); }
  .gate-card button { width: 100%; margin-top: 14px; font-size: 15px; font-weight: 600; color: #fff; background: #1789c1; border: none; border-radius: 10px; padding: 12px; cursor: pointer; }
  .gate-card button:hover { background: #1560a8; }
  .gate-err { color: #be123c; font-size: 13px; margin-top: 12px; min-height: 18px; }
  /* 头部 */
  .doc-header { border-bottom: 2px solid #1789c1; padding-bottom: 12px; margin-bottom: 20px; }
  .doc-header h1 { font-size: 22px; color: #1560a8; margin: 0 0 6px; }
  .brand-row { display: flex; align-items: center; gap: 10px; }
  .brand-row h1 { margin: 0; }
  .patient { font-size: 14px; color: #334155; }
  .generated { font-size: 12px; color: #94a3b8; margin-top: 4px; }
  .privacy-note { font-size: 12px; color: #475569; background: #e6f6fa; border: 1px solid #c8ebf1; border-radius: 10px; padding: 10px 12px; margin-bottom: 20px; line-height: 1.6; }
  /* 记录卡片 */
  .record { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; page-break-inside: avoid; }
  .record-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .record-head h2 { font-size: 16px; margin: 0; color: #0f172a; flex: 1; min-width: 120px; }
  .badge { font-size: 11px; font-weight: 700; border-radius: 999px; padding: 2px 10px; }
  .date { font-size: 12px; color: #64748b; font-variant-numeric: tabular-nums; }
  .content { font-size: 15px; line-height: 1.7; color: #334155; }
  .content > * + * { margin-top: 10px; }
  .content table { width: 100%; border-collapse: collapse; font-size: 13px; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
  .content thead tr { background: #f8fafc; color: #64748b; font-size: 12px; }
  .content th { text-align: left; font-weight: 600; padding: 7px 12px; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
  .content td { padding: 6px 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
  .content tr.high td { color: #b45309; }
  .content tr.low td { color: #1560a8; }
  .content tr.normal td { color: #334155; }
  .content .section { font-weight: 600; color: #0f172a; padding-top: 2px; }
  .content .label { font-weight: 600; color: #0f172a; }
  .content .para { white-space: pre-wrap; word-break: break-word; }
  /* 处方 */
  .meds { display: flex; flex-direction: column; gap: 8px; }
  .med { display: flex; gap: 12px; background: #ecfdf5; border: 1px solid #d1fae5; border-radius: 12px; padding: 12px; }
  .med .n { width: 26px; height: 26px; border-radius: 8px; background: #d1fae5; color: #047857; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: 700; font-size: 13px; }
  .med .name { font-weight: 600; color: #1e293b; }
  .med .usage { font-size: 13px; color: #64748b; line-height: 1.6; }
  .meds-label { font-size: 11px; font-family: ui-monospace, monospace; color: #94a3b8; letter-spacing: .15em; text-transform: uppercase; }
  .img { max-width: 100%; max-height: 480px; display: block; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 8px; }
  /* 影像检查:缩略卡 + 说明 */
  .imaging-card { margin: 10px 0; }
  .imaging-open { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; background: #0f172a; color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 600; }
  .pdf-dl { display: inline-flex; align-items: center; gap: 6px; margin: 8px 0; text-decoration: none; background: #1789c1; color: #fff; border-radius: 10px; padding: 9px 14px; font-size: 13px; font-weight: 600; }
  .pdf-dl:hover { background: #1560a8; }
  .imaging-open:hover { background: #1e293b; }
  .imaging-open .ico { font-size: 16px; }
  .imaging-meta { font-size: 12px; color: #64748b; margin-top: 6px; line-height: 1.6; }
  .imaging-png { max-width: 100%; max-height: 480px; display: block; margin: 8px 0; background: #000; border: 1px solid #e2e8f0; border-radius: 8px; }
  .imaging-note { font-size: 12px; color: #b45309; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 8px 10px; margin-top: 6px; line-height: 1.6; }
  /* 影像检查 · 按时间(医生视图 section:按部位分组,跨时间看变化,点开看诊断级原件)*/
  .imgsec { margin: 22px 0 8px; }
  .imgsec-h { font-size: 13px; font-weight: 700; color: #64748b; letter-spacing: .04em; margin: 0 0 12px; }
  .imgsec-grp { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(30,41,59,.05); }
  .imgsec-grp-t { font-weight: 700; font-size: 14px; color: #0f172a; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .imgsec-grp-t .cnt { font-size: 11px; font-weight: 700; color: #1560a8; background: #e6f6fa; border-radius: 999px; padding: 1px 8px; }
  .imgsec-study { display: grid; grid-template-columns: 84px 1fr auto; gap: 12px; align-items: start; padding: 9px 0; border-top: 1px solid #f1f5f9; }
  .imgsec-study:first-of-type { border-top: 0; }
  .imgsec-date { font-size: 12.5px; font-weight: 700; color: #1560a8; font-variant-numeric: tabular-nums; padding-top: 3px; }
  .imgsec-find { font-size: 13.5px; color: #334155; line-height: 1.6; min-width: 0; word-break: break-word; }
  .imgsec-find.empty { color: #94a3b8; }
  .imgsec-open { flex-shrink: 0; white-space: nowrap; cursor: pointer; background: #0f172a; color: #fff; border: none; border-radius: 9px; padding: 7px 13px; font-size: 12.5px; font-weight: 600; font-family: inherit; }
  .imgsec-open:hover { background: #1e293b; }
  /* 证据跳转后的浮动「返回」按钮 */
  .back-jump { position: fixed; right: 18px; bottom: 22px; z-index: 55; display: none; align-items: center; gap: 6px; background: #0f172a; color: #fff; border: none; border-radius: 999px; padding: 11px 18px; font-size: 13.5px; font-weight: 600; font-family: inherit; cursor: pointer; box-shadow: 0 4px 16px rgba(15,23,42,.3); }
  .back-jump:hover { background: #1e293b; }
  /* 全部原件折叠(有 summary 时默认收起,医生先看泳道 + 影像)*/
  details.allrecs { margin-top: 8px; }
  details.allrecs > summary { font-size: 13px; font-weight: 700; color: #64748b; letter-spacing: .04em; margin: 22px 0 12px; cursor: pointer; list-style: none; }
  details.allrecs > summary::-webkit-details-marker { display: none; }
  details.allrecs > summary::before { content: "▸ "; color: #94a3b8; }
  details.allrecs[open] > summary::before { content: "▾ "; }
  /* 全屏原件灯箱(手机照片 / 关键切片 PNG:全分辨率可平移,保证诊断可读性)*/
  .lb-overlay { position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,.92); display: flex; flex-direction: column; }
  .lb-bar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: rgba(0,0,0,.6); color: rgba(255,255,255,.85); }
  .lb-bar .lb-name { font-size: 13px; margin-right: auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-stage { flex: 1; min-height: 0; background: #000; }
  .lb-stage.fit { overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .lb-stage.fit img { max-width: 100%; max-height: 100%; display: block; }
  .lb-stage.full { overflow: auto; }
  .lb-stage.full img { max-width: none; max-height: none; display: block; margin: auto; }
  .lb-pdf { flex: 1; min-height: 0; width: 100%; border: 0; background: #fff; }
  /* 全屏阅片 overlay(移植桌面端 lightbox 观感)*/
  .dcm-overlay { position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,.9); display: flex; flex-direction: column; }
  .dcm-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 8px 12px; background: rgba(0,0,0,.6); color: rgba(255,255,255,.85); }
  .dcm-bar .name { font-family: ui-monospace, Menlo, monospace; font-size: 13px; margin-right: auto; max-width: 40%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dcm-btn { font-size: 12px; padding: 6px 12px; border-radius: 8px; background: rgba(255,255,255,.1); color: rgba(255,255,255,.85); border: none; cursor: pointer; }
  .dcm-btn:hover { background: rgba(255,255,255,.2); }
  .dcm-doctor { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: #fcd34d; }
  .dcm-sep { width: 1px; height: 16px; background: rgba(255,255,255,.2); }
  .dcm-idx { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: rgba(255,255,255,.7); }
  .dcm-hintbar { font-size: 11px; color: rgba(255,255,255,.7); margin-left: auto; }
  .dcm-stage { position: relative; flex: 1; min-height: 0; background: #000; overflow: hidden; }
  .dcm-stage canvas { display: block; touch-action: none; }
  .dcm-notice { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.75); color: rgba(255,255,255,.9); font-size: 12px; padding: 8px 16px; border-radius: 8px; max-width: 80%; text-align: center; pointer-events: none; }
  .dcm-floathint { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.75); color: #fff; font-size: 14px; padding: 10px 20px; border-radius: 999px; pointer-events: none; }
  .statement { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 24px; padding-top: 12px; border-top: 1px solid #e2e8f0; }
  @media print {
    body { background: #fff; }
    .record { border: 1px solid #cbd5e1; box-shadow: none; }
    .privacy-note { background: #fff; }
    @page { margin: 16mm 14mm; }
  }
  /* 托管查看器:文件投放区 */
  .dropzone { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 22px 16px; text-align: center; cursor: pointer; background: #f8fafc; transition: border-color .15s, background .15s; margin-bottom: 16px; }
  .dropzone:hover { border-color: #2bc0d2; background: #f1f5f9; }
  .dropzone.drag { border-color: #1789c1; background: #e6f6fa; }
  .dz-icon { font-size: 26px; }
  .dz-main { font-size: 13px; color: #475569; margin-top: 6px; line-height: 1.6; }
  .dz-file { font-size: 12px; color: #047857; margin-top: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; min-height: 16px; }
  /* 医生视图 summary — 疾病泳道时间轴 + 趋势(#37);仅当 payload.summary 存在时渲染 */
  .sum { margin-bottom: 22px; }
  .sum-top { display: grid; grid-template-columns: 1.25fr 1fr; gap: 14px; margin-bottom: 16px; align-items: start; }
  @media (max-width: 700px) { .sum-top { grid-template-columns: 1fr; } }
  .sum-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 16px 18px; box-shadow: 0 1px 3px rgba(30,41,59,.05); }
  .sum-row { display: flex; gap: 10px; font-size: 13.5px; padding: 3px 0; }
  .sum-lab { color: #94a3b8; font-size: 12px; font-weight: 700; min-width: 56px; flex-shrink: 0; padding-top: 2px; }
  .sum-bad { color: #be123c; }
  .sum-copy { margin-top: 14px; width: 100%; border: 0; background: #1789c1; color: #fff; font-weight: 700; font-size: 14.5px; padding: 12px; border-radius: 11px; cursor: pointer; font-family: inherit; }
  .sum-copy:active { background: #1560a8; }
  .sum-emr { margin-top: 9px; background: #f6f8fb; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
  .sum-emr summary { padding: 9px 12px; font-size: 12.5px; color: #94a3b8; cursor: pointer; }
  .sum-emr pre { margin: 0; padding: 0 12px 12px; white-space: pre-wrap; font-size: 12.5px; line-height: 1.75; color: #1e293b; font-family: inherit; }
  .sum-h { font-size: 11px; letter-spacing: .08em; color: #94a3b8; font-weight: 700; }
  .sum-changes ul { margin: 9px 0 0; padding-left: 18px; }
  .sum-changes li { margin: 4px 0; font-size: 14px; }
  .sum-hint { margin: 6px 2px 10px; font-size: 12px; color: #94a3b8; }
  .sum-chips { display: flex; gap: 8px; margin: 0 2px 12px; flex-wrap: wrap; }
  .sum-chip { border: 1px solid #e2e8f0; background: #fff; color: #64748b; font-family: inherit; font-size: 12.5px; font-weight: 650; padding: 6px 15px; border-radius: 999px; cursor: pointer; }
  .sum-chip.on { background: #1789c1; border-color: #1789c1; color: #fff; }
  .sum-tl { padding: 16px 18px 12px; }
  .sum-tl-h { font-size: 11px; letter-spacing: .08em; color: #94a3b8; font-weight: 700; padding: 0 0 12px; }
  .sum-legend { display: flex; flex-wrap: wrap; gap: 7px 18px; font-size: 11px; color: #94a3b8; padding: 0 0 12px; margin-bottom: 8px; border-bottom: 1px solid #eef2f6; }
  .sum-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .lg2 { display: inline-block; flex-shrink: 0; }
  .lg2.bar { width: 18px; height: 9px; border-radius: 5px; }
  .lg2.bar.ok { background: #1789c1; } .lg2.bar.warn { background: #be123c; }
  .lg2.dotev { width: 11px; height: 11px; border-radius: 50%; background: #94a3b8; border: 2px solid #fff; box-shadow: 0 0 0 1px #e2e8f0; }
  .lg2.pt { width: 7px; height: 7px; border-radius: 50%; background: #1789c1; } .lg2.pt.bad { background: #be123c; }
  .sum-axis { display: grid; grid-template-columns: 150px 1fr; gap: 12px; margin-bottom: 4px; }
  .sum-axtrack { position: relative; height: 15px; }
  .sum-yr { position: absolute; top: 1px; font-size: 10.5px; color: #94a3b8; transform: translateX(-50%); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .lane2 { display: grid; grid-template-columns: 150px 1fr; gap: 12px; align-items: center; padding: 9px 0; cursor: pointer; border-radius: 9px; }
  .lane2:hover { background: #eef2f6; }
  .lane2.open { background: #e6f6fa; }
  .lane2.hide { display: none; }
  .lane2.zebra { background: rgba(23,137,193,.028); }
  .lh { display: flex; align-items: center; gap: 6px; min-width: 0; padding-left: 4px; }
  .lh .cv { color: #94a3b8; font-size: 10px; flex-shrink: 0; }
  .lane2.open .lh .cv { transform: rotate(90deg); }
  .lh .nm { font-weight: 700; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lst { font-size: 10.5px; font-weight: 700; padding: 1px 8px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; margin-left: auto; }
  .lst.ok { color: #1560a8; background: #e6f6fa; } .lst.warn { color: #be123c; background: #fceef1; }
  .trk { position: relative; height: 26px; border-radius: 4px; }
  .bar2 { position: absolute; top: 6px; height: 14px; border-radius: 7px; min-width: 8px; }
  .bar2.ok { background: #1789c1; } .bar2.warn { background: #be123c; } .bar2.soft { background: #94a3b8; opacity: .55; }
  .dev2 { position: absolute; top: 7px; width: 13px; height: 13px; border-radius: 50%; transform: translateX(-50%); background: #94a3b8; border: 2px solid #fff; box-shadow: 0 0 0 1px #e2e8f0; }
  .det2 { border-top: 1px solid #eef2f6; margin: 0 2px 6px; padding: 2px 0 10px; display: none; }
  .det2.open { display: block; }
  .bh { font-size: 11px; letter-spacing: .06em; color: #94a3b8; font-weight: 700; margin: 14px 0 4px; }
  .lr2 { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-top: 1px solid #eef2f6; }
  .rn { font-weight: 600; font-size: 14px; } .rf { color: #94a3b8; font-size: 11.5px; font-variant-numeric: tabular-nums; }
  .rv { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 15px; } .rv.bad { color: #be123c; }
  .ev2 { cursor: pointer; color: #1560a8; font-size: 11.5px; border: 1px solid #c8ebf1; background: #f0fafe; border-radius: 6px; padding: 1px 7px; white-space: nowrap; }
  .med2 { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
  .md { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; } .md.on { background: #1789c1; } .md.off { background: #94a3b8; }
  .mn { font-weight: 600; font-size: 14px; } .mn.off { color: #94a3b8; text-decoration: line-through; }
  .mmv { color: #94a3b8; font-size: 12.5px; }
  .mt2 { margin-left: auto; font-size: 10.5px; font-weight: 700; padding: 1px 7px; border-radius: 6px; }
  .mt2.on { color: #1560a8; background: #e6f6fa; } .mt2.off { color: #94a3b8; background: #eef2f6; }
</style>

function b64ToBytes(b64) {

function splitCells(line) { return line.trim().split(/\s{2,}|\t/).filter(c => c.length > 0); }

      html += '<div style="overflow-x:auto"><table>';
      if (b.header) {

        for (const h of b.header) html += "<th>" + esc(h) + "</th>";
        html += "</tr></thead>";

    const cw = stage.clientWidth, ch = stage.clientHeight;
    const dpr = window.devicePixelRatio || 1;
    if (canvas.width !== Math.round(cw*dpr) || canvas.height !== Math.round(ch*dpr)) {
      canvas.width = Math.round(cw*dpr); canvas.height = Math.round(ch*dpr);
      canvas.style.width = cw+"px"; canvas.style.height = ch+"px";
    }
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.fillStyle = "#000"; ctx.fillRect(0,0,cw,ch);
    if (!dec || dec.kind === "unsupported" || dec.kind === "error") return;
    let srcCols, srcRows, source;
    if (dec.kind === "bitmap") { srcCols = dec.cols; srcRows = dec.rows; source = dec.bitmap; }
    else if (dec.kind === "rgba") {
      srcCols = dec.data.width; srcRows = dec.data.height;
      const off = document.createElement("canvas"); off.width = srcCols; off.height = srcRows;
      off.getContext("2d").putImageData(dec.data, 0, 0); source = off;
    } else {
      srcCols = dec.cols; srcRows = dec.rows;
      const w = win.width <= 0 ? 1 : win.width; const low = win.center - w/2;
      const img = new ImageData(srcCols, srcRows); const d = img.data; const vals = dec.values;
      for (let i = 0; i < vals.length; i++) {
        let out = ((vals[i]-low)/w)*255; out = out<0?0:out>255?255:out;
        if (dec.invert) out = 255-out;
        const o = i*4; d[o]=d[o+1]=d[o+2]=out; d[o+3]=255;
      }
      const off = document.createElement("canvas"); off.width = srcCols; off.height = srcRows;
      off.getContext("2d").putImageData(img, 0, 0); source = off;
    }
    const fit = Math.min(cw/srcCols, ch/srcRows);
    const dw = srcCols*fit*view.zoom, dh = srcRows*fit*view.zoom;
    const dx = (cw-dw)/2 + view.panX, dy = (ch-dh)/2 + view.panY;
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(source, dx, dy, dw, dh);
  }

  function evict(current) {
    while (cache.size > DCM_CACHE_MAX) {
      let far = -1, farDist = -1;
      for (const k of cache.keys()) { const dist = Math.abs(k-current); if (dist > farDist) { farDist = dist; far = k; } }
      if (far < 0) break;
      const ent = cache.get(far); if (ent && ent.kind === "bitmap") ent.bitmap.close();
      cache.delete(far);
    }
  }
  function redraw() { const dec = cache.get(curIdx); if (dec) paint(dec); }
  function prefetch(idx) {
    for (const j of [idx+1, idx-1]) {
      if (j < 0 || j >= frames.length || cache.has(j)) continue;
      dcmDecodeFrame(frames[j]).then(d => {
        if (cache.has(j)) { if (d.kind === "bitmap") d.bitmap.close(); return; }
        cache.set(j, d); evict(curIdx);
      });
    }
  }
  async function showFrame(idx, resetWindow) {
    if (idx < 0 || idx >= frames.length) return;
    curIdx = idx; setIdx(); setNotice(null);
    const token = ++drawToken;
    const fm = frames[idx];
    let dec = cache.get(idx);
    if (!dec) {
      dec = await dcmDecodeFrame(fm);
      if (token !== drawToken) { if (dec.kind === "bitmap") dec.bitmap.close(); return; }
      cache.set(idx, dec); evict(idx);
    }
    if (token !== drawToken) return;
    if (dec.kind === "unsupported") setNotice("此压缩格式暂不支持交互查看(见卡片关键切片)");
    if (dec.kind === "error") setNotice("影像加载失败");
    if (resetWindow) win = dcmDefaultWindow(fm, dec);
    paint(dec); prefetch(idx);
  }

  // 交互:滚轮翻层 / Ctrl+滚轮缩放;左键调窗位(灰度)否则平移;右键缩放;中键平移。
  function onWheel(e) {
    e.preventDefault();
    if (e.ctrlKey) { const f = e.deltaY>0?0.9:1.1; view.zoom = Math.min(20, Math.max(0.2, view.zoom*f)); redraw(); return; }
    if (floatHint) floatHint.style.display = "none";
    const next = curIdx + (e.deltaY>0?1:-1);
    if (next < 0 || next >= frames.length) return;
    showFrame(next);
  }
  function onDown(e) { drag = { button: e.button, x: e.clientX, y: e.clientY }; }
  function onMove(e) {
    if (!drag) return;
    const dx = e.clientX-drag.x, dy = e.clientY-drag.y; drag.x = e.clientX; drag.y = e.clientY;
    const dec = cache.get(curIdx);
    if (drag.button === 0) {
      if (dec && dec.kind === "gray") { win.width = Math.max(1, win.width + dx*2); win.center = win.center + dy*2; redraw(); }
      else { view.panX += dx; view.panY += dy; redraw(); }
    } else if (drag.button === 2) { const f = Math.exp(-dy*0.005); view.zoom = Math.min(20, Math.max(0.2, view.zoom*f)); redraw(); }
    else { view.panX += dx; view.panY += dy; redraw(); }
  }
  function onUp() { drag = null; }
  function applyPreset(i) {
    const p = DCM_PRESETS[i]; const fm = frames[curIdx]; const dec = cache.get(curIdx);
    if (!fm || !dec) return;
    win = (p.center == null || p.width == null) ? dcmDefaultWindow(fm, dec) : { center: p.center, width: p.width };
    redraw();
  }
  function reset() {
    view = { zoom: 1, panX: 0, panY: 0 };
    const fm = frames[curIdx]; const dec = cache.get(curIdx);
    if (fm && dec) win = dcmDefaultWindow(fm, dec);
    redraw();
  }

  canvas.addEventListener("wheel", onWheel, { passive: false });
  canvas.addEventListener("mousedown", onDown);
  canvas.addEventListener("mousemove", onMove);
  canvas.addEventListener("mouseup", onUp);
  canvas.addEventListener("mouseleave", onUp);
  canvas.addEventListener("contextmenu", e => e.preventDefault());
  const ro = new ResizeObserver(() => redraw()); ro.observe(stage);

  overlay.addEventListener("click", e => {
    const t = e.target;
    if (t.dataset && t.dataset.close) { close(); return; }
    if (t.dataset && t.dataset.reset) { reset(); return; }
    if (t.dataset && t.dataset.z) { const f = t.dataset.z === "in" ? 1.2 : 1/1.2; view.zoom = Math.min(20, Math.max(0.2, view.zoom*f)); redraw(); return; }
    if (t.dataset && t.dataset.p != null && t.dataset.p !== "") { applyPreset(parseInt(t.dataset.p,10)); return; }
  });
  function onKey(e) { if (e.key === "Escape") close(); }
  document.addEventListener("keydown", onKey);

  function close() {
    drawToken++;
    ro.disconnect();
    document.removeEventListener("keydown", onKey);
    for (const ent of cache.values()) if (ent.kind === "bitmap") ent.bitmap.close();
    cache.clear();
    overlay.remove();
  }

  setIdx();
  if (frames.length === 0) { setNotice("影像加载失败"); return; }
  if (total > 1) { floatHint.textContent = "↕ 滚轮上下翻看每一层(共 " + total + " 张)"; floatHint.style.display = "block";
    setTimeout(() => { floatHint.style.display = "none"; }, 4500); }
  showFrame(0, true);
}

// ── 医生视图 summary:疾病泳道时间轴 + 趋势(#37)────────────────────────────
// 仅当 payload.summary 存在时渲染(app 端确定性提取产出,分组依据见 docs/030 §3b:
// 药按 ATC、化验按具名指南)。缺省则本模块完全不介入,查看器回退纯文档列表(老分享不受影响)。
// 消费形状:summary = { problems:[{term,onset:"YYYY-MM",end?,status,acute?,warn?,open?,evidence?:[recIdx],
//   labs:[{name,unit,refHigh?,refLow?,pts:[["YYYY-MM",num]],evidence?}], meds:[{name,dose,on,span,evidence?}]}],
//   allergies:[{substance,reaction}], notable_changes:[string] }。onset=首次在记录中出现(非确诊日)。
const SUM_MN = s => { const a = String(s || "").split("-"); return (+a[0]) * 12 + ((+a[1] || 1) - 1); };
function sumFlag(v, lo, hi) { return (hi != null && v > hi) || (lo != null && v < lo); }

function sparkSVG(L) {
  const W = 190, H = 42, padL = 4, padR = 32, padT = 6, padB = 12;
  const pts = L.pts || []; if (!pts.length) return "";
  const xs = pts.map(p => SUM_MN(p[0])), x0 = Math.min(...xs), xr = (Math.max(...xs) - x0) || 1;
  const vs = pts.map(p => p[1]);
  let lo = Math.min(...vs, L.refLow == null ? Infinity : L.refLow), hi = Math.max(...vs, L.refHigh == null ? -Infinity : L.refHigh);
  const pd = (hi - lo) * 0.2 || 1; lo -= pd; hi += pd; const yr = (hi - lo) || 1;
  const XX = m => padL + (m - x0) / xr * (W - padL - padR), Y = v => H - padB - (v - lo) / yr * (H - padT - padB);
  let s = '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" style="overflow:visible;flex-shrink:0">';
  if (L.refLow != null || L.refHigh != null) {
    const yt = Y(L.refHigh == null ? hi : L.refHigh), yb = Y(L.refLow == null ? lo : L.refLow);
    s += '<rect x="' + padL + '" y="' + yt.toFixed(1) + '" width="' + (W - padL - padR) + '" height="' + Math.max(0, yb - yt).toFixed(1) + '" fill="#e6f6fa"></rect>';
  }
  let d = ""; pts.forEach((p, i) => { d += (i ? "L" : "M") + XX(SUM_MN(p[0])).toFixed(1) + " " + Y(p[1]).toFixed(1) + " "; });
  s += '<path d="' + d + '" fill="none" stroke="#1789c1" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"></path>';
  pts.forEach((p, i) => {
    const last = i === pts.length - 1, bad = sumFlag(p[1], L.refLow, L.refHigh), col = bad ? "#be123c" : "#1789c1";
    s += '<circle cx="' + XX(SUM_MN(p[0])).toFixed(1) + '" cy="' + Y(p[1]).toFixed(1) + '" r="' + (last ? 3.4 : 2.2) + '" fill="' + col + '"' + (last ? ' stroke="#fff" stroke-width="1.5"' : '') + '></circle>';
    if (last) s += '<text x="' + (XX(SUM_MN(p[0])) + 6).toFixed(1) + '" y="' + (Y(p[1]) + 3.5).toFixed(1) + '" font-size="10" font-weight="700" fill="' + col + '">' + p[1] + '</text>';
  });
  return s + '</svg>';
}

function buildEMRFromSummary(sm, patient) {
  // 院外就诊经历模版(见 docs/030 §3c):叙事型、以就诊为轴、确定性填充,缺项自动略过。
  // 三条原则:①化验只放主要阳性 + 趋势(阳性优先);②影像/病理前置为重点;③宁多勿少(医生删易插难)。
  const p = patient || {};
  const who = [p.name, p.gender, p.age ? p.age + "岁" : ""].filter(Boolean).join(",");
  const yr = s => String(s || "").slice(0, 4);
  const facility = sm.care_facility || (sm.recent_encounters && sm.recent_encounters[0] && sm.recent_encounters[0].provider) || "外院";
  const dx = (sm.problems || []).filter(x => !x.acute).map(x => x.term + (x.onset ? "(" + yr(x.onset) + ")" : "")).join("、");
  // 影像 / 病理:重点前置。字段须与 assemble_summary 一致:影像 = [{group, studies:[{finding}]}],
  // 病理 = [{date, conclusion}](此前误读 i.name/i.finding,导致复制文本里影像/病理内容为空)。
  const imaging = (sm.imaging || []).flatMap(g => (g.studies || []).filter(st => st.finding).map(st => (g.group || "影像") + "提示" + st.finding)).join(";");
  const pathology = (sm.pathology || []).filter(i => i.conclusion).map(i => "病理提示" + i.conclusion).join(";");
  // 化验:主要阳性 + 趋势,阳性优先
  const labItems = [];
  (sm.problems || []).forEach(pr => (pr.labs || []).forEach(x => {
    const pts = x.pts || []; if (!pts.length) return;
    const last = pts[pts.length - 1][1], first = pts[0][1];
    const dir = (x.refHigh != null && last > x.refHigh) ? "↑" : (x.refLow != null && last < x.refLow) ? "↓" : "";
    labItems.push({ t: (x.short || x.name) + " " + (pts.length > 1 ? first + "→" + last : last) + (x.unit || "") + dir, abn: !!dir });
  }));
  labItems.sort((a, b) => (b.abn ? 1 : 0) - (a.abn ? 1 : 0));
  const labStr = labItems.map(i => i.t).join(";");
  const onMeds = [], offMeds = [];
  (sm.problems || []).forEach(pr => (pr.meds || []).forEach(m => (m.on ? onMeds : offMeds).push(m.name + (m.dose ? " " + m.dose : ""))));
  let lastDate = "";
  (sm.problems || []).forEach(pr => (pr.labs || []).forEach(x => (x.pts || []).forEach(q => { if (q[0] > lastDate) lastDate = q[0]; })));
  const status = sm.status_note || "病情" + ((sm.problems || []).some(x => x.warn) ? "部分指标未达标" : "相对稳定");
  const reason = sm.visit_reason || "进一步诊治";
  const L = [];
  if (who) L.push("患者" + who + "。");
  let s1 = "既往于" + facility + "诊治";
  if (dx) s1 += ",诊断为" + dx;
  s1 += "。";
  if (imaging) s1 += imaging + "。";
  if (pathology) s1 += pathology + "。";
  if (onMeds.length) s1 += "予" + onMeds.join("、") + "治疗" + (offMeds.length ? "(" + offMeds.join("、") + "已停)" : "") + "。";
  L.push(s1);
  let s2 = "近期" + (lastDate ? "(" + lastDate + ")" : "") + "复查";
  if (labStr) s2 += ":" + labStr;
  s2 += "。目前系" + status + "状态";
  if (onMeds.length) s2 += ",现规律服用" + onMeds.join("、") + "治疗";
  if (sm.effect) s2 += ",效果" + sm.effect;
  s2 += "。患者为" + reason + "来我院就诊。";
  L.push(s2);
  if ((sm.allergies || []).length) L.push("过敏史:" + sm.allergies.map(a => a.substance + (a.reaction ? "(" + a.reaction + ")" : "")).join("、") + "。");
  L.push("(由患者 MedMe 整理,数值取自原件,供参考、以原件为准;医生可按需增删。)");
  return L.join("\n");
}

function renderSummary(sm, asOf, patient) {
  const hasOnset = o => /^\d{4}-\d{2}/.test(o || ""); // 「其他」桶/无日期诊断无 onset → 不进域、不画条、排最后
  const probs = (sm.problems || []).slice().sort((a, b) =>
    (hasOnset(a.onset) ? SUM_MN(a.onset) : Infinity) - (hasOnset(b.onset) ? SUM_MN(b.onset) : Infinity));
  if (!probs.length) return "";
  // 时间标度:域 = [最早起病所在年的1月, 现在(取 asOf / 最晚数据点的较大者)];缺 onset 不参与
  const months = [];
  probs.forEach(p => { if (hasOnset(p.onset)) months.push(SUM_MN(p.onset)); if (hasOnset(p.end)) months.push(SUM_MN(p.end)); (p.labs || []).forEach(L => (L.pts || []).forEach(pt => { if (hasOnset(pt[0])) months.push(SUM_MN(pt[0])); })); });
  const asOfM = asOf ? SUM_MN(String(asOf).slice(0, 7)) : -Infinity;
  const NOW = Math.max(asOfM, months.length ? Math.max(...months) : 0);
  const minYear = Math.floor(Math.min(...months.concat(NOW)) / 12);
  const maxYear = Math.floor(NOW / 12);
  const T0 = minYear * 12, SPAN = (NOW - T0) || 1;
  const X = m => (m - T0) / SPAN * 100;
  const STEP = 12 / SPAN * 100;
  const gridBg = "repeating-linear-gradient(90deg,#eef2f6 0 1px,transparent 1px " + STEP.toFixed(3) + "%)";
  const evChip = ev => (ev && ev.length) ? '<span class="ev2" data-ev="' + (ev[0] | 0) + '">原件</span>' : "";

  let axis = "";
  for (let y = minYear; y <= maxYear; y++) { const xp = Math.max(2, Math.min(98, X(y * 12))); axis += '<div class="sum-yr" style="left:' + xp.toFixed(2) + '%">' + y + '</div>'; }

  let lanes = "";
  probs.forEach(pr => {
    const acute = !!pr.acute, warn = !!pr.warn, cls = acute ? "soft" : (warn ? "warn" : "ok");
    const hasOn = hasOnset(pr.onset);
    const left = hasOn ? X(SUM_MN(pr.onset)) : 0;
    const bar = !hasOn
      ? '' // 无 onset(如「其他」):不画横条,只留可展开的行
      : acute
        ? '<span class="dev2" style="left:' + left.toFixed(2) + '%"></span>'
        : '<span class="bar2 ' + cls + '" style="left:' + left.toFixed(2) + '%;width:' + Math.max(1.5, X(pr.end && hasOnset(pr.end) ? SUM_MN(pr.end) : NOW) - left).toFixed(2) + '%"></span>';
    const st = pr.status || (acute ? "已愈" : (warn ? "需关注" : "稳定"));
    lanes += '<div class="lane2' + (pr.open ? " open" : "") + '" data-acute="' + (acute ? 1 : 0) + '" data-warn="' + (warn ? 1 : 0) + '">'
      + '<div class="lh"><span class="cv">▶</span><span class="nm">' + esc(pr.term) + '</span>'
      + '<span class="lst ' + (warn ? "warn" : "ok") + '">' + esc(st) + '</span></div>'
      + '<div class="trk" style="background-image:' + gridBg + '">' + bar + '</div></div>';
    let db = "";
    if (acute) {
      db = '<div style="font-size:13px;color:#94a3b8;padding:12px 0 2px">一次性急性事件,已痊愈。无长期随访指标或维持用药。</div>';
    } else {
      if ((pr.labs || []).length) {
        db += '<div class="bh">相关化验</div>';
        pr.labs.forEach(L => {
          const pts = L.pts || []; if (!pts.length) return; const last = pts[pts.length - 1], bad = sumFlag(last[1], L.refLow, L.refHigh);
          const refTxt = L.refLow != null ? "≥" + L.refLow : (L.refHigh != null ? "<" + L.refHigh : "");
          db += '<div class="lr2"><div style="flex:1;min-width:0"><div class="rn">' + esc(L.name) + '</div><div class="rf">参考 ' + esc(refTxt) + ' ' + esc(L.unit || "") + '</div></div>'
            + sparkSVG(L)
            + '<div style="text-align:right;min-width:52px"><span class="rv' + (bad ? " bad" : "") + '">' + last[1] + '</span><div class="rf">' + esc(last[0]) + " " + evChip(L.evidence) + '</div></div></div>';
        });
      }
      if ((pr.meds || []).length) {
        db += '<div class="bh">相关用药</div>';
        pr.meds.forEach(m => {
          db += '<div class="med2"><span class="md ' + (m.on ? "on" : "off") + '"></span><span class="mn ' + (m.on ? "" : "off") + '">' + esc(m.name) + '</span>'
            + '<span class="mmv">' + esc((m.dose || "") + (m.span ? " · " + m.span : "")) + '</span>' + evChip(m.evidence) + '<span class="mt2 ' + (m.on ? "on" : "off") + '">' + (m.on ? "在用" : "已停") + '</span></div>';
        });
      }
    }
    lanes += '<div class="det2' + (pr.open ? " open" : "") + '">' + db + '</div>';
  });

  const diseases = probs.filter(p => !p.acute).map(p => esc(p.term)).join(" · ");
  const onMeds = [], offMeds = [];
  probs.forEach(p => (p.meds || []).forEach(m => (m.on ? onMeds : offMeds).push(esc(m.name))));
  const medsLine = onMeds.join(" · ") + (offMeds.length ? ' <span style="color:#94a3b8">(' + offMeds.join("、") + "已停)</span>" : "");
  const allerg = (sm.allergies || []).map(a => esc(a.substance) + (a.reaction ? "(" + esc(a.reaction) + ")" : "")).join("、");
  const emrText = buildEMRFromSummary(sm, patient);

  let h = '<div class="sum"><div class="sum-top"><div class="sum-card">';
  if (diseases) h += '<div class="sum-row"><span class="sum-lab">在治疾病</span><span>' + diseases + '</span></div>';
  if (onMeds.length || offMeds.length) h += '<div class="sum-row"><span class="sum-lab">当前用药</span><span>' + medsLine + '</span></div>';
  if (allerg) h += '<div class="sum-row"><span class="sum-lab">过敏史</span><span class="sum-bad">' + allerg + '</span></div>';
  h += '<button class="sum-copy" type="button">📋 复制为病历文本(可直接粘进你的病历)</button>'
    + '<details class="sum-emr"><summary>预览要复制的文本 ▾</summary><pre id="sum-emr-text">' + esc(emrText) + '</pre></details></div>';
  if ((sm.notable_changes || []).length)
    h += '<div class="sum-card sum-changes"><div class="sum-h">近期变化</div><ul>' + sm.notable_changes.map(c => '<li>' + esc(c) + '</li>').join("") + '</ul></div>';
  // 病理可视区块(此前病理只进「复制为病历文本」,查看器无可见区块)。字段 = {date, conclusion}。
  if ((sm.pathology || []).length)
    h += '<div class="sum-card"><div class="sum-h">病理</div><ul>' + sm.pathology.map(pt => '<li>' + esc(pt.conclusion || "") + (pt.date ? ' <span style="color:#94a3b8">(' + esc(pt.date) + ')</span>' : "") + '</li>').join("") + '</ul></div>';
  h += '</div>';
  h += '<div class="sum-hint">点击任一疾病条 → 展示该病细节(化验趋势与用药)。自上而下 = 发病由早到晚。</div>';
  h += '<div class="sum-chips"><button class="sum-chip on" type="button" data-f="all">全部</button><button class="sum-chip" type="button" data-f="active">只看在治</button><button class="sum-chip" type="button" data-f="abn">只看异常</button></div>';
  h += '<div class="sum-card sum-tl"><div class="sum-tl-h">病程时间轴</div>';
  h += '<div class="sum-legend"><span><i class="lg2 bar ok"></i>慢病病程 · 稳定</span><span><i class="lg2 bar warn"></i>需关注</span><span><i class="lg2 dotev"></i>急性事件 / 已愈</span><span><i class="lg2 pt"></i>一次化验&nbsp;<i class="lg2 pt bad"></i>异常值</span></div>';
  h += '<div class="sum-axis"><div></div><div class="sum-axtrack">' + axis + '</div></div>' + lanes + '</div></div>';
  return h;
}

function wireSummary(app) {
  const chips = [...app.querySelectorAll(".sum-chip")];
  const lanes = [...app.querySelectorAll(".lane2")];
  function applyF(f) {
    let z = 0;
    lanes.forEach(l => {
      const acute = l.dataset.acute === "1", warn = l.dataset.warn === "1";
      const show = f === "all" || (f === "active" && !acute) || (f === "abn" && warn);
      l.classList.toggle("hide", !show);
      const det = l.nextElementSibling;
      if (!show) { l.classList.remove("open"); if (det && det.classList.contains("det2")) det.classList.remove("open"); }
      l.classList.toggle("zebra", show && (z++ % 2 === 1));
    });
  }
  chips.forEach(c => c.addEventListener("click", () => { chips.forEach(x => x.classList.toggle("on", x === c)); applyF(c.dataset.f); }));
  lanes.forEach(l => l.addEventListener("click", ev => {
    if (ev.target.closest(".ev2")) return;
    const det = l.nextElementSibling; if (!det || !det.classList.contains("det2")) return;
    const o = det.classList.toggle("open"); l.classList.toggle("open", o);
  }));
  app.querySelectorAll(".ev2").forEach(e => e.addEventListener("click", ev => {
    ev.stopPropagation();
    jumpToRecord(e.dataset.ev | 0); // 泳道证据跳转:先展开「全部原件」再滚到该份
  }));
  const cp = app.querySelector(".sum-copy");
  if (cp) cp.addEventListener("click", async () => {
    const el = app.querySelector("#sum-emr-text"); const txt = el ? el.textContent : "";
    try { await navigator.clipboard.writeText(txt); cp.textContent = "✓ 已复制,可粘进病历"; setTimeout(() => { cp.textContent = "📋 复制为病历文本(可直接粘进你的病历)"; }, 1800); }
    catch (e) { cp.textContent = "⚠ 复制受限,请展开下方预览手动选中"; }
  });
  applyF("all");
}

// 跳到某份原件:先展开折叠的「全部原件」,再平滑滚动 + 高亮(泳道证据 + 影像兜底共用)。
let backReturnY = 0;
// 跳转后浮出「↑ 返回」,一键平滑滚回跳转前的位置(医生看完原件不用手动往回翻)。
function showBackButton(fromY) {
  backReturnY = fromY;
  let b = document.getElementById("back-jump");
  if (!b) {
    b = document.createElement("button");
    b.id = "back-jump"; b.className = "back-jump"; b.type = "button";
    b.textContent = "↑ 返回时间轴";
    b.addEventListener("click", () => { window.scrollTo({ top: backReturnY, behavior: "smooth" }); b.style.display = "none"; });
    document.body.appendChild(b);
  }
  b.style.display = "inline-flex";
}

function jumpToRecord(idx) {
  const t = document.getElementById("rec-" + idx);
  if (!t) return;
  const fromY = window.scrollY; // 记住跳转前位置,供「返回」用
  const dt = t.closest("details.allrecs"); if (dt) dt.open = true;
  t.scrollIntoView({ behavior: "smooth", block: "start" });
  showBackButton(fromY);
  const o = t.style.background; t.style.transition = "background .25s"; t.style.background = "#fffbeb";
  setTimeout(() => { t.style.background = o; }, 1300);
}

// 全屏原件灯箱:照片 / DICOM 关键切片 PNG。默认适应屏幕,可切原始分辨率(滚动平移),保证诊断可读。
function openImageViewer(src, name) {
  const ov = document.createElement("div");
  ov.className = "lb-overlay";
  ov.innerHTML = '<div class="lb-bar"><span class="lb-name"></span>'
    + '<button class="dcm-btn" data-fit="1">原始分辨率</button>'
    + '<button class="dcm-btn" data-close="1">关闭 · ESC</button></div>'
    + '<div class="lb-stage fit"><img alt="原件"></div>';
  ov.querySelector(".lb-name").textContent = name || "原件";
  const stage = ov.querySelector(".lb-stage");
  ov.querySelector("img").src = src;
  const fitBtn = ov.querySelector("[data-fit]");
  fitBtn.addEventListener("click", () => {
    const full = stage.classList.toggle("full"); stage.classList.toggle("fit", !full);
    fitBtn.textContent = full ? "适应屏幕" : "原始分辨率";
  });
  function close() { ov.remove(); document.removeEventListener("keydown", onKey); }
  function onKey(e) { if (e.key === "Escape") close(); }
  ov.querySelector("[data-close]").addEventListener("click", close);
  ov.addEventListener("click", e => { if (e.target === ov || e.target === stage) close(); });
  document.addEventListener("keydown", onKey);
  document.body.appendChild(ov);
}

// 全屏 PDF 原件预览:直接用浏览器内置(沙箱化)PDF 阅读器内嵌显示 data: PDF,
// 不再触发下载(下载留给底下「全部原件」核对)。data: 源不联网,CSP 仅放行 frame-src data:。
function openPdfViewer(src, name) {
  const ov = document.createElement("div");
  ov.className = "lb-overlay";
  ov.innerHTML = '<div class="lb-bar"><span class="lb-name"></span>'
    + '<a class="dcm-btn" download="原件.pdf">⬇ 下载</a>'

    + '<iframe class="lb-pdf" title="原件 PDF"></iframe>';

  ov.querySelector("iframe").src = src;
  ov.querySelector("a[download]").href = src;
  function close() { ov.remove(); document.removeEventListener("keydown", onKey); }
  function onKey(e) { if (e.key === "Escape") close(); }
  ov.querySelector("[data-close]").addEventListener("click", close);
  document.addEventListener("keydown", onKey);
  document.body.appendChild(ov);
}

// 打开某份原件的诊断级视图:DICOM→阅片器,PNG/照片→灯箱,PDF→内嵌预览,无可视原件→跳到文字记录。
function openOriginal(rec, idx) {
  if (!rec) return;
  const d = rec.dicom;
  if (d && d.mode === "interactive" && d.frames) { openDicomViewer(d.frames.map(f => b64ToBytes(f)), rec.title || "影像检查"); return; }
  if (d && d.mode === "png" && isDataImage(d.png)) { openImageViewer(d.png, rec.title || "影像检查"); return; }
  const img = (rec.images || []).find(isDataImage);
  if (img) { openImageViewer(img, rec.title || "原件"); return; }
  if (isDataPdf(rec.pdf)) { openPdfViewer(rec.pdf, rec.title || "原件"); return; }
  jumpToRecord(idx);
}

function openLabel(rec) {
  const d = rec.dicom;
  if (d && d.mode === "interactive") return "🎞 打开阅片器";
  if ((d && d.mode === "png" && isDataImage(d.png)) || (rec.images || []).some(isDataImage)) return "🔍 查看原件";
  if (isDataPdf(rec.pdf)) return "📄 查看原件";
  return "查看该份";
}

function renderImaging(imaging, records) {
  const groups = (imaging || []).filter(g => g && (g.studies || []).length);
  if (!groups.length) return "";
  let h = '<div class="imgsec"><div class="imgsec-h">影像检查 · 按时间(同部位跨时间看变化 · 点开为诊断级原件)</div>';
  groups.forEach(g => {
    const studies = g.studies || [];
    h += '<div class="imgsec-grp"><div class="imgsec-grp-t">' + esc(g.group || "影像检查")
      + '<span class="cnt">' + studies.length + ' 次</span></div>';
    studies.forEach(s => {
      const ev = (s.evidence && s.evidence.length) ? (s.evidence[0] | 0) : -1;
      const rec = (ev >= 0 && ev < records.length) ? records[ev] : null;
      const find = (s.finding || "").trim();
      h += '<div class="imgsec-study">'
        + '<div class="imgsec-date">' + esc(s.date || "无日期") + '</div>'
        + '<div class="imgsec-find' + (find ? '' : ' empty') + '">' + (find ? esc(find) : "(原件未提取到结论文字,点右侧查看原件)") + '</div>'
        + (rec ? '<button class="imgsec-open" type="button" data-rec="' + ev + '">' + openLabel(rec) + '</button>' : '<span></span>')
        + '</div>';
    });
    h += '</div>';
  });
  return h + '</div>';
}

async function decryptAndRender(passphrase) {
  const blob = b64ToBytes(EMBEDDED_BLOB);
  const iv = blob.slice(0, 12);
  const data = blob.slice(12);
  // 仅去空白/换行还原分组;不可去 "-",因为它是 base64url 字母表的一部分。
  const keyBytes = b64urlToBytes(passphrase.replace(/\s+/g, ""));
  const key = await crypto.subtle.importKey("raw", keyBytes, { name: "AES-GCM" }, false, ["decrypt"]);
  // AAD 必须与 Rust 加密端 SHARE_AAD 逐字节一致(ASCII "medme-share-v1")。
  const aad = new TextEncoder().encode("medme-share-v1");
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv, additionalData: aad }, key, data); // 口令错误则抛异常
  const payload = JSON.parse(new TextDecoder().decode(pt));
  // 注:expires 只是分享方建议的“复阅期限”,是一条礼貌提醒——文件本身不会失效、不会自毁,
  // 持有文件与口令者始终可离线解密。渲染时以非强制横幅展示,绝不阻断查看。
  render(payload);
}

// ── 二维码分享(面对面扫码)────────────────────────────────────────────
// fragment 形如 `#q1.<base64url(nonce‖密文)>.<base64url(密钥)>`,由患者手机上的
// 二维码携带。与整份分享的区别:载荷是**有界的当下病情**(在治的病、每个指标最近
// 几个点、在用的药),没有原件与影像 —— 那些在患者手机上当场翻。
//
// 密钥同在 `#` 之后:面对面出示二维码本身即是「在场证明」,再让医生手输口令只是
// 徒增摩擦。代价是截屏即等于拿到钥匙 —— 与患者把屏幕给别人看是同一量级的风险。
const QR_PREFIX = "q1.";

async function renderQrSummary(fragment) {
  const [blobB64, keyB64] = fragment.slice(QR_PREFIX.length).split(".");
  if (!blobB64 || !keyB64) throw new Error("二维码内容不完整");
  const blob = b64urlToBytes(blobB64);
  const key = await crypto.subtle.importKey(
    "raw", b64urlToBytes(keyB64), { name: "AES-GCM" }, false, ["decrypt"]);
  // AAD 必须与 Rust 端 QR_AAD 逐字节一致,且**刻意不同于**整份分享的
  // medme-share-v1 —— 两种载荷不该被互相当成对方解开。
  const aad = new TextEncoder().encode("medme-qr-v1");
  const gz = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: blob.slice(0, 12), additionalData: aad }, key, blob.slice(12));
  // gzip 解压用浏览器原生 DecompressionStream,不引任何前端库。
  const stream = new Blob([gz]).stream().pipeThrough(new DecompressionStream("gzip"));
  const payload = JSON.parse(await new Response(stream).text());
  render(payload);
  // 明示这是「当下病情」而非完整病历,免得医生以为看到了全部。
  const note = document.createElement("div");
  note.className = "notice";
  note.style.cssText = "margin:12px 0";
  note.textContent =
    "本页来自患者当面出示的二维码,只包含当前在治的问题、关键指标与在用药物 —— "
    + "不是完整病历。需要看原件、影像或更早的记录,请让患者在手机上出示。";
  const app = document.getElementById("app");
  app.insertBefore(note, app.firstChild ? app.firstChild.nextSibling : null);
}

let shareFileText = null;

// 从投放的 MedMe 分享文件里提取内嵌加密 blob。新版分享(share.rs)把 blob 放进一个
// 非执行 JSON 数据节点(type="application/json" id="share-data",内容 {"blob":"<标准 base64>"})
// —— 标准 base64 与该 JSON 均不含 "<",故 [^<]+ 精确截取到该节点收尾标签前。为兼容早期
// 分享,回退匹配旧的内联常量写法  EMBEDDED_BLOB = "…"。
// (注:本注释刻意不写出脚本收尾标签字面量,以免提前闭合本内联脚本块。)
function extractBlob(text) {
  const j = text.match(/id="share-data"[^>]*>([^<]+)<\/script>/);
  if (j) { try { const b = JSON.parse(j[1]).blob; if (b) return b; } catch (e) { /* 回退旧格式 */ } }
  const m = text.match(/EMBEDDED_BLOB\s*=\s*"([^"]+)"/);
  return m ? m[1] : null;
}
function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    shareFileText = String(reader.result);
    fileNameEl.textContent = "已选择:" + file.name;
    errEl.textContent = "";
  };
  reader.onerror = () => { errEl.textContent = "读取文件失败,请重试。"; };
  reader.readAsText(file);
}
drop.addEventListener("click", () => fileInput.click());
drop.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileInput.click(); } });
fileInput.addEventListener("change", e => loadFile(e.target.files && e.target.files[0]));
["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("drag"); }));
["dragleave"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("drag"); }));
drop.addEventListener("drop", e => { e.preventDefault(); drop.classList.remove("drag"); loadFile(e.dataTransfer.files && e.dataTransfer.files[0]); });
// 允许把文件拖到页面任意处(阻止浏览器直接打开文件)。
window.addEventListener("dragover", e => e.preventDefault());
window.addEventListener("drop", e => {
  e.preventDefault();
  if (document.getElementById("gate").style.display !== "none") loadFile(e.dataTransfer.files && e.dataTransfer.files[0]);
});

async function submit() {
  errEl.textContent = "";
  // 自包含模式下 EMBEDDED_BLOB 已由本文档 #share-data 就位,无需拖文件。
  if (!selfContained) {
    if (!shareFileText) { errEl.textContent = "请先拖入或选择 MedMe 加密分享文件(.html)。"; return; }
    const blob = extractBlob(shareFileText);
    if (!blob) { errEl.textContent = "未在该文件中找到加密数据,请确认这是 MedMe 加密分享文件。"; return; }
    EMBEDDED_BLOB = blob;
  }
  const val = pw.value.trim();
  if (!val) { errEl.textContent = "请输入口令。"; return; }
  try {
    await decryptAndRender(val);
    pw.value = ""; // 成功后清空口令输入,避免明文口令滞留 DOM
  } catch (e) {
    errEl.textContent = "口令错误,无法解密。请核对本人告知的口令。";
  }
}
// 自包含分享文件:本文档已内嵌 #share-data(share.rs 注入)→ 直接进口令模式,隐藏拖
// 文件区;托管查看器(无内嵌数据)保持拖文件模式。二者共用同一份查看器(唯一源)。
let selfContained = false;
(function detectEmbeddedShare() {
  const sd = document.getElementById("share-data");
  if (!sd) return;
  try {
    const b = JSON.parse(sd.textContent).blob;
    if (b) {
      selfContained = true;
      EMBEDDED_BLOB = b;
      drop.style.display = "none";
      const p = document.querySelector(".gate-card p");
      if (p) p.textContent = "本文件已内嵌端到端加密的病历,数据只在你的浏览器本地解密、不经任何服务器。请输入本人另行告知的口令查看。";
    }
  } catch (e) { /* 非法数据节点:回退拖文件模式 */ }
})();
document.getElementById("go").addEventListener("click", submit);

// 口令可随 URL fragment 送达:`#<口令>`。`#` 之后的内容按 HTTP 规范**不会**发给
// 服务器,因此链接/二维码分享时,密钥始终只存在于收件人浏览器本地。到达即自动解密,
// 免去手输;随后清掉 hash,避免口令留在地址栏与浏览历史里。
(function fromHash() {
  const h = decodeURIComponent(location.hash.replace(/^#/, "")).trim();
  if (!h) return;
  const clearHashNow = () => {
    if (location.hash) history.replaceState(null, "", location.pathname + location.search);
  };
  // 二维码载荷:数据与密钥都在 fragment 里,不需要内嵌分享文件。
  if (h.startsWith(QR_PREFIX)) {
    addEventListener("load", clearHashNow);
    setTimeout(clearHashNow, 60);
    renderQrSummary(h)
      .catch(() => {
        errEl.textContent = "二维码内容无法解析,请让患者重新出示。";
      })
      .finally(clearHashNow);
    return;
  }
  if (!selfContained) return;
  // 解析期调用 replaceState 会被随后的片段导航覆盖(实测),故解密完成后再清,
  // 并在 load 时兜底一次 —— 口令绝不该留在地址栏和浏览历史里。
  const clearHash = () => {
    if (location.hash) history.replaceState(null, "", location.pathname + location.search);
  };
  addEventListener("load", clearHash);
  // 解析期与 load 时清都可能被浏览器随后的片段导航覆盖,故再补一次延迟清除。
  setTimeout(clearHash, 60);
  pw.value = h;
  Promise.resolve(submit()).finally(clearHash);
})();
pw.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
