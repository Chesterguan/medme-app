# iOS: Rust cdylib references Swift @_cdecl symbols (medme_vision_*) that are
# provided by the Xcode app target's Swift, compiled AFTER cargo. Allow the
# dylib to keep them undefined; the final app link resolves them.
[target.aarch64-apple-ios]
rustflags = ["-C", "link-arg=-Wl,-undefined,dynamic_lookup"]
[target.aarch64-apple-ios-sim]
rustflags = ["-C", "link-arg=-Wl,-undefined,dynamic_lookup"]
[target.x86_64-apple-ios]
rustflags = ["-C", "link-arg=-Wl,-undefined,dynamic_lookup"]
