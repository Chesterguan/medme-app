name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust workspace: format, lint, and test the library crates + the CLI.
  # NOTE: the Tauri desktop (medme-desktop) and iOS (medme-mobile) apps are
  # intentionally NOT built here — they need webkit2gtk / Xcode and are built
  # locally (`pnpm -C apps/desktop tauri build`). CI covers the portable core.
  rust:
    name: Rust (core crates + CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # CMake + a C/C++ toolchain are required to build the vendored
      # JPEG2000 (OpenJPEG) / JPEG-LS (CharLS) codecs used by the dicom crate.
      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Mobile is Flutter now (apps/mobile_flutter), built by mobile.yml; its Rust
      # crate is workspace-excluded, so this desktop/core check never touches it.
      - name: rustfmt
        run: >
          cargo fmt --check
          -p core-model -p parser -p pipeline -p ocr -p dicom
          -p medme-share -p medme-cli -p medme-desktop

      - name: clippy
        run: >
          cargo clippy
          -p core-model -p parser -p pipeline -p ocr -p dicom -p medme-share
          --all-targets -- -D warnings

      - name: test
        run: >
          cargo test
          -p core-model -p parser -p pipeline -p ocr -p dicom
          -p medme-share -p medme-cli

  # Desktop frontend: type-check and production build (Vite).
  # Vite 7 requires Node ^20.19 || >=22.12, so we pin Node 20 (not 18).
  frontend:
    name: Desktop frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm -C apps/desktop install --frozen-lockfile

      - name: Type-check
        run: pnpm -C apps/desktop exec tsc --noEmit

      - name: Build
        run: pnpm -C apps/desktop build

  # Dependency vulnerability scan against the RustSec advisory DB. A newly
  # disclosed CVE in any (transitive) crate fails this job so it can't land
  # silently. Informational advisories (unmaintained/unsound) are reported but
  # non-fatal — the Tauri Linux GUI stack pulls many unmaintained gtk-rs crates
  # with no alternative, so failing on those would make the gate useless.
  audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: taiki-e/install-action@17dfa9a7aa66ae804b5cbd9f505a33815221f967 # cargo-audit
      - name: cargo audit (fail on vulnerabilities)
        run: cargo audit
