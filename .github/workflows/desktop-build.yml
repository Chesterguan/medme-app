# Cross-platform release builds for the MedMe desktop app (apps/desktop, Tauri v2).
#
# Produces downloadable installers so no local Windows/macOS/Linux box is needed:
#   Windows -> .exe (NSIS)         (WiX/MSI `light.exe` is flaky in CI, so NSIS only)
#   macOS   -> .dmg
#   Linux   -> .deb + .AppImage    (rpm skipped: needs rpmbuild, absent on runner)
# Bundle target is chosen per-OS via `--bundles` in the build step (matrix.bundles).
#
# This is a SEPARATE workflow from ci.yml (which only tests the portable core) so
# it can never break the test pipeline.
#
# Builds are UNSIGNED — no code-signing secrets are configured. That is fine for
# internal / early distribution. To sign later, add:
#   Windows: a code-signing cert + `signCommand`/env, or Tauri's signing config.
#   macOS:   APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY + notarization creds.
# and Tauri's updater signing key (TAURI_SIGNING_PRIVATE_KEY) if the updater is enabled.
name: Desktop build

on:
  # Manual trigger from the Actions tab.
  workflow_dispatch:
  # Any tag like v1.0.0 -> build installers and attach them to a GitHub Release.
  push:
    tags:
      - "v*"

# Least-privilege by default; the release step needs write access to create releases.
permissions:
  contents: write

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other OS builds if one fails.
      fail-fast: false
      matrix:
        include:
          # Windows: NSIS .exe installer (WiX/MSI `light.exe` is flaky in CI).
          - os: windows-latest # required
            bundles: nsis
          # macOS: .dmg. Pinned to macos-14 + Xcode 15 — macos-latest rolled to
          # Xcode 16.4 whose clang toolchain lacks `clang_rt.osx`, breaking the
          # Rust link step non-deterministically.
          - os: macos-14 # nice-to-have
            bundles: dmg
          # Linux: .deb + AppImage (skip rpm — needs rpmbuild, not on the runner).
          - os: ubuntu-latest # nice-to-have
            bundles: deb,appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # --- System build deps -------------------------------------------------
      # CMake + a C/C++ toolchain + LLVM/clang are needed to build the vendored
      # JPEG2000 (openjpeg-sys) / JPEG-LS (charls-sys) DICOM codecs; bindgen (used
      # by some -sys crates) needs libclang, hence LIBCLANG_PATH on Windows.

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            file wget

      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: brew install cmake

      # windows-latest ships CMake and LLVM preinstalled (C:\Program Files\LLVM).
      # We just point bindgen at libclang. If a future runner drops LLVM, swap this
      # for: `choco install --no-progress cmake llvm` then set the same path.
      - name: Configure Windows toolchain (CMake + LLVM/clang)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-Not (Test-Path "C:\Program Files\LLVM\bin\libclang.dll")) {
            choco install --no-progress -y llvm cmake
          }
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # --- Toolchains --------------------------------------------------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Keep a per-OS cache; the Tauri crate lives under apps/desktop/src-tauri.
          key: desktop-${{ matrix.os }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 20 # Vite 7 requires Node ^20.19 || >=22.12
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      # --- Build -------------------------------------------------------------
      - name: Install frontend dependencies
        run: pnpm -C apps/desktop install --frozen-lockfile

      # Runs the `tauri` package script -> `tauri build`, which first runs the
      # configured beforeBuildCommand (`pnpm build` = tsc + vite build) then
      # compiles the Rust app and bundles installers for the host OS.
      - name: Build desktop app (Tauri)
        run: pnpm -C apps/desktop tauri build --bundles ${{ matrix.bundles }}

      # --- Publish -----------------------------------------------------------
      # Installers land in target/release/bundle/<type>/.
      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: medme-desktop-${{ matrix.os }}
          if-no-files-found: error
          retention-days: 14
          path: |
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.AppImage

      # On a tag push, attach every OS's installers to a single GitHub Release.
      - name: Attach installers to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          draft: true # publish manually after a quick smoke-test of the installers
          fail_on_unmatched_files: false
          files: |
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.AppImage
