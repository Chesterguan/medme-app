# 短时模糊测试:每次 PR 花几分钟,挡住明显的崩溃/OOM 回归。
# 不是替代持续模糊测试(OSS-Fuzz 那种 7×24),是最低成本的常态防线。
#
# 为什么值得:MedMe 的解析器吃的是**陌生人给的文件** —— 医院光盘里的 DICOM、
# 微信转来的 PDF、别人发给医生的分享文件。畸形输入若能让解码器越界读写,
# 就是远程代码执行(GHSA-24px 即此类,故桌面端把 DICOM 解码关进子进程)。
name: Fuzz (short)

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: parser_text
            gating: true
          - target: summary_assemble
            gating: true
          # dicom_parse 目前会命中上游 dicom-rs 的内存耗尽类问题(按数据元素
          # 声明长度直接分配,早于我们的守卫)。我们已加前置守卫收敛了一部分,
          # 但未彻底关闭 —— 在修复或上游修复前,这条只报告、不卡 CI。
          - target: dicom_parse
            gating: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # nightly
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@17dfa9a7aa66ae804b5cbd9f505a33815221f967 # cargo-fuzz
        with:
          tool: cargo-fuzz
      - name: cargo fuzz run ${{ matrix.target }} (120s)
        continue-on-error: ${{ !matrix.gating }}
        run: |
          set -euo pipefail
          cd fuzz
          # taiki-e/install-action 装的是 musl 静态链接的 cargo-fuzz,它会把自己的
          # 构建目标当成 fuzz 目标,而 sanitizer 与静态 libc 不兼容 —— 故显式指定
          # 当前工具链的 host target。
          HOST=$(rustc +nightly -vV | awk '/^host:/{print $2}')
          cargo +nightly fuzz run --target "$HOST" ${{ matrix.target }} -- \
            -max_total_time=120 -rss_limit_mb=2048
      - name: 上传复现样本(仅在失败时)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          retention-days: 7
