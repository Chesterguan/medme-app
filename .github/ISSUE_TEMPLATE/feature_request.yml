name: 功能建议 / Feature request
description: 提议一个新功能或改进 / Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        MedMe 的原则是**本地优先、原件不灭、患者优先、隐私为核心**。
        请说明你的建议如何契合这些原则(尤其是不牺牲隐私/离线能力)。

        MedMe is local-first, privacy-first, and keeps originals immutable.
        Please describe how your idea fits these principles.
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题 / What problem does this solve
      description: 你遇到的实际场景 / The real situation you hit
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议的方案 / Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 相关模块 / Area
      options:
        - 采集 / OCR (capture / OCR)
        - 生命时间线 / 归类 (timeline / grouping)
        - 渲染 / 阅片 (rendering / viewers)
        - 导出 / 分享 (export / share)
        - 手机端 (mobile)
        - 安全 / 隐私 (security / privacy)
        - 其他 (other)
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案 (可选) / Alternatives considered (optional)
