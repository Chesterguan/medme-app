version: 2
updates:
  # Rust workspace (root Cargo.toml / Cargo.lock) — all updates in ONE grouped PR
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      cargo:
        patterns: ["*"]

  # Desktop frontend (pnpm) — all updates in ONE grouped PR
  - package-ecosystem: npm
    directory: "/apps/desktop"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm:
        patterns: ["*"]

  # GitHub Actions used in workflows — all updates in ONE grouped PR
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns: ["*"]
